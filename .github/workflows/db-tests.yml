name: DB Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pgtap:
    name: pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.105.0

      - name: Clean up any previous local Supabase stack
        run: |
          supabase stop --no-backup || true
          docker ps -aq --filter "name=supabase" | xargs -r docker rm -f
          docker network ls --filter "name=supabase" -q | xargs -r docker network rm || true

      - name: Start local Supabase stack
        run: supabase db start

      - name: Run pgTAP suite
        run: supabase test db

      - name: Security advisors
        run: supabase db advisors --local --type security --level warn --fail-on warn

      - name: Performance advisors
        run: supabase db advisors --local --type performance --level warn --fail-on warn

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup || true
