name: Dependency Review

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        # Private repositories without GitHub Advanced Security support can
        # report "Dependency review is not supported on this repository."
        # Keep this advisory; CI's npm audit/signature/IOC checks are the
        # enforceable dependency gate for this repo.
        continue-on-error: true
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
