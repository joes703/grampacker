name: Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        # Private repositories without GitHub Advanced Security support can
        # report "Dependency review is not supported on this repository."
        # Keep this advisory; CI's npm audit/signature/IOC checks are the
        # enforceable dependency gate for this repo.
        continue-on-error: true
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
